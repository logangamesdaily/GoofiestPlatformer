<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Goofy Platformer (Web)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --gp-purple: #4b2c7d;
      --gp-orange: #ff9b3b;
      --gp-bg: #0b0614;
      --gp-accent: #35f0b6;
      --gp-text: #fef7ff;
      --gp-panel: #1a102b;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #24113f 0, #05020a 60%, #000 100%);
      color: var(--gp-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(90deg, #2b174a, #4b2c7d);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header h1 span.logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--gp-orange);
      box-shadow: 0 0 12px var(--gp-orange);
    }

    header .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.75rem;
      gap: 0.75rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 0.75rem;
      height: calc(100vh - 64px - 1.5rem);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        height: auto;
      }
    }

    .panel {
      background: radial-gradient(circle at top left, #2b174a 0, #12091f 40%, #05020a 100%);
      border-radius: 14px;
      padding: 0.75rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.9;
    }

    .pill {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      opacity: 0.8;
    }

    .search-row {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .search-row input {
      flex: 1;
      padding: 0.4rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(5, 2, 10, 0.7);
      color: var(--gp-text);
      font-size: 0.85rem;
      outline: none;
    }

    .search-row button {
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--gp-orange), #ffcf5b);
      color: #2b174a;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 155, 59, 0.7);
      white-space: nowrap;
    }

    .search-row button:active {
      transform: translateY(1px);
      box-shadow: 0 0 6px rgba(255, 155, 59, 0.5);
    }

    .level-list {
      flex: 1;
      overflow: auto;
      padding-right: 0.25rem;
      margin-top: 0.25rem;
    }

    .level-item {
      padding: 0.45rem 0.5rem;
      border-radius: 10px;
      margin-bottom: 0.25rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      transition: background 0.15s, border-color 0.15s, transform 0.05s;
      font-size: 0.8rem;
    }

    .level-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .level-item.active {
      border-color: var(--gp-accent);
      box-shadow: 0 0 12px rgba(53, 240, 182, 0.6);
      background: radial-gradient(circle at left, rgba(53, 240, 182, 0.18), rgba(255, 255, 255, 0.02));
    }

    .level-title-row {
      display: flex;
      justify-content: space-between;
      gap: 0.4rem;
      align-items: center;
    }

    .level-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .level-meta {
      font-size: 0.7rem;
      opacity: 0.8;
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .level-stars {
      color: #ffd76a;
    }

    .level-description {
      font-size: 0.75rem;
      opacity: 0.8;
      max-height: 2.4em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.4rem;
      font-size: 0.8rem;
    }

    .play-bar button {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--gp-accent), #7bffd9);
      color: #041015;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(53, 240, 182, 0.7);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .play-bar button:active {
      transform: translateY(1px);
      box-shadow: 0 0 6px rgba(53, 240, 182, 0.5);
    }

    .play-bar .hint {
      opacity: 0.7;
    }

    .play-bar .hint span {
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 0.1rem 0.35rem;
      border-radius: 999px;
    }

    .canvas-panel {
      position: relative;
      overflow: hidden;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 10px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0.5rem;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .overlay-top {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .overlay-bottom {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      opacity: 0.85;
    }

    .overlay-pill {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .overlay-pill span.key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.7rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.05rem 0.3rem;
      border-radius: 999px;
    }

    .status-text {
      font-size: 0.8rem;
      opacity: 0.85;
    }

    .status-text strong {
      color: var(--gp-accent);
    }

    .muted {
      opacity: 0.6;
    }

    .error {
      color: #ff7b7b;
    }
  </style>
</head>
<body>
  <header>
    <h1>
      <span class="logo-dot"></span>
      Goofy Platformer <span style="opacity:0.6;">Web</span>
    </h1>
    <div class="header-right">
      <span class="pill">v0.3.1 (fan web port)</span>
      <span class="muted">Arrow keys / A D to move · Space / W / ↑ to jump</span>
    </div>
  </header>

  <main>
    <div class="layout">
      <!-- LEFT: MENU / LEVEL BROWSER -->
      <section class="panel">
        <div class="panel-header">
          <h2>Levels</h2>
          <span class="pill">Online</span>
        </div>

        <div class="search-row">
          <input id="searchInput" type="text" placeholder="Search levels by name, description, or creator…" />
          <button id="searchButton">Search</button>
        </div>

        <div class="play-bar">
          <button id="playButton">
            ▶ Play selected
          </button>
          <div class="hint">
            <span>Enter</span> to play · <span>R</span> to restart
          </div>
        </div>

        <div id="menuStatus" class="status-text" style="margin-top:0.35rem;">
          Loading levels…
        </div>

        <div id="levelList" class="level-list"></div>
      </section>

      <!-- RIGHT: GAME CANVAS -->
      <section class="panel canvas-panel">
        <div class="panel-header">
          <h2>Game</h2>
          <span class="pill" id="currentLevelLabel">No level loaded</span>
        </div>
        <canvas id="gameCanvas" width="960" height="540"></canvas>

        <div class="overlay">
          <div class="overlay-top">
            <div class="overlay-pill">
              <span>Controls</span>
              <span class="key">←</span>
              <span class="key">→</span>
              <span class="key">Space</span>
              <span class="key">R</span>
            </div>
            <div class="overlay-pill">
              <span id="overlayStatus">Idle</span>
            </div>
          </div>
          <div class="overlay-bottom">
            <div class="overlay-pill muted">
              <span>New objects:</span>
              <span class="key">Jump Orbs</span>
              <span class="key">Grav Orbs</span>
              <span class="key">Pads</span>
            </div>
            <div class="overlay-pill muted">
              <span id="fpsLabel">FPS: --</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
